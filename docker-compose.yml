version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: spend-management-db
    environment:
      POSTGRES_DB: spend_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spend-management-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: spend_management
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./templates:/root/templates
      - ./static:/root/static

volumes:
  postgres_data: