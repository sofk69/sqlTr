{{ define "content" }}
<h1>Создание нового пользователя</h1>

<div class="form-container">
    <form action="/create-user" method="POST">
        <div class="form-group">
            <label for="age">Возраст (оставьте пустым для случайного):</label>
            <input type="number" id="age" name="age" min="18" max="90">
        </div>
        
        <div class="form-group">
            <label for="email">Email (оставьте пустым для случайного):</label>
            <input type="email" id="email" name="email">
        </div>
        
        <div class="form-group">
            <label for="first_name">Имя (оставьте пустым для случайного):</label>
            <input type="text" id="first_name" name="first_name">
        </div>
        
        <div class="form-group">
            <label for="last_name">Фамилия (оставьте пустым для случайного):</label>
            <input type="text" id="last_name" name="last_name">
        </div>
        
        <button type="submit" class="btn btn-success">Создать пользователя</button>
        <a href="/" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{{ end }}
