{{ define "content" }}
<h1>Добавление платежа</h1>

<div class="form-container">
    <form action="/add-payment" method="POST">
        <div class="form-group">
            <label for="user_id">ID пользователя:</label>
            <input type="number" id="user_id" name="user_id" value="{{ .UserID }}" required>
        </div>
        
        <div class="form-group">
            <label for="amount">Сумма (оставьте пустым для случайной):</label>
            <input type="number" id="amount" name="amount" min="1">
        </div>
        
        <div class="form-group">
            <label for="payment_name">Название платежа (оставьте пустым для случайного):</label>
            <input type="text" id="payment_name" name="payment_name">
        </div>
        
        <button type="submit" class="btn btn-success">Добавить платеж</button>
        <a href="/" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{{ end }}
